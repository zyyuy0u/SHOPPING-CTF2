<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>暗黑市場 // 地下商店</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container d-flex justify-content-between align-items-center">
            <span class="navbar-brand cursor-blink">暗黑市場</span>
            <div class="d-flex gap-3">
                <a href="submit_flag.html" class="nav-flag-btn">[ FLAG 提交 ]</a>
                <a href="cart.html" class="nav-cart-btn">
                    [ 購物車 ]
                    <span class="badge cart-badge" id="cartBadge" style="display:none;"></span>
                </a>
                <button onclick="if(confirm('確定要重置所有進度嗎？餘額、購物車、購買紀錄、Flag 提交紀錄都會被清除。')){Store.reset();location.reload();}" class="nav-flag-btn" style="border-color:rgba(255,50,50,0.4);color:#ff4444;cursor:pointer;background:none;">[ 重置 ]</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- 餘額卡片 -->
        <div class="balance-card text-center">
            <h4>// 錢包餘額</h4>
            <h1 id="balanceDisplay">$100</h1>
            <small class="terminal-prefix">初始餘額 $100 | 目標：限量黃金禮盒 ($100,000)</small>
        </div>

        <!-- 訊息提示 -->
        <div id="messageArea"></div>

        <!-- 商品列表 -->
        <h3 class="section-title">商品列表</h3>
        <div class="row g-4" id="productGrid"></div>

        <!-- 購買紀錄 -->
        <div id="purchaseHistory"></div>

        <div style="height: 60px;"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/store.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
