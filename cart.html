<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>購物車 // 暗黑市場</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="navbar-brand">暗黑市場</a>
            <span class="nav-label">// 購物車</span>
        </div>
    </nav>

    <div class="container mt-4">
        <div id="messageArea"></div>
        <div id="cartContent"></div>
    </div>

    <!-- Flag 彈窗：購買禮盒成功 -->
    <div class="modal fade modal-flag" id="flagModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center">
                <div class="modal-header" style="background: linear-gradient(135deg, rgba(255, 215, 0, 0.15), rgba(255, 179, 71, 0.1)) !important;">
                    <h5 class="modal-title w-100" style="color: var(--neon-yellow) !important;">// FLAG CAPTURED</h5>
                </div>
                <div class="modal-body py-4">
                    <h1 class="display-1 mb-3">&#127881;</h1>
                    <h3 style="color: var(--neon-yellow);">恭喜通關！</h3>
                    <p class="mt-3" style="font-size: 0.85rem;">
                        你利用了數值驗證漏洞，<br>
                        透過購買負數商品增加餘額，成功買下了目標商品。
                    </p>
                    <div class="flag-value mt-3" onclick="copyFlag(this)" title="點擊複製" id="flagValue"></div>
                    <small style="color: rgba(192,192,192,0.4); font-size: 0.75rem;">點擊 Flag 可複製</small>
                </div>
                <div class="modal-footer justify-content-center">
                    <a href="submit_flag.html" class="btn btn-modal-close">前往提交</a>
                    <a href="index.html" class="btn btn-modal-close" style="border-color: rgba(0,229,255,0.4); color: var(--neon-cyan);">回商店</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/store.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
